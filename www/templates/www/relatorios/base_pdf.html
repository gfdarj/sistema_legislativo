<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>{% block titulo %}Relatório{% endblock %}</title>
<style>
    @page {
        size: A4;
        margin: 2cm 1.5cm;
        @bottom-right {
            content: "Página " counter(page) " de " counter(pages);
            font-size: 9px;
            color: #666;
        }
    }
    body { font-family: Helvetica, Arial, sans-serif; font-size: 11px; color: #222; }
    h1 { font-size: 18px; margin: 0 0 2px 0; }
    h2 { font-size: 14px; margin: 18px 0 6px 0; border-bottom: 1px solid #999; padding-bottom: 2px; }
    .subtitulo { color: #555; margin-bottom: 4px; }
    .meta { font-size: 9px; color: #777; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    th { background: #eee; text-align: left; }
    th, td { border: 1px solid #bbb; padding: 4px 6px; vertical-align: top; }
    .center { text-align: center; }
    .destaque { color: #b30000; font-weight: bold; }
    .ok { color: #1a7a1a; }
    .muted { color: #777; }
</style>
</head>
<body>

<h1>{% block cabecalho %}{% endblock %}</h1>
{% block subtitulo %}{% endblock %}
<div class="meta">
    Gerado em {{ gerado_em|date:"d/m/Y H:i" }} por {{ gerado_por.username }}
</div>

{% block conteudo %}{% endblock %}

</body>
</html>
